version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: paios_prod_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_prod_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7.0-alpine
    container_name: paios_prod_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: paios_prod_chromadb
    ports:
      - "8000:8000"
    environment:
      - ANONYMIZED_TELEMETRY=False
    volumes:
      - chromadb_prod_data:/chroma/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: paios_prod_backend
    expose:
      - "8000"
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - DATABASE_NAME=AGENT
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - ENVIRONMENT=production
      - DEBUG=False
    depends_on:
      - mongodb
      - redis
      - chromadb
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: paios_prod_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_prod_data:
  chromadb_prod_data:
